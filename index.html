<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>TRIO — Game of the Month</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

header{
text-align:center;
padding:35px;
font-size:36px;
font-weight:700;
letter-spacing:2px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.container{
width:1200px;
margin:auto;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:25px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

table{
width:100%;
border-collapse:collapse;
font-size:18px;
}

th{
text-transform:uppercase;
letter-spacing:1px;
opacity:0.8;
}

th,td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

tr{
transition:0.2s;
cursor:pointer;
}

tr:hover{
background:rgba(255,255,255,0.08);
transform:scale(1.01);
}

.rank1{color:gold;font-weight:700}
.rank2{color:silver;font-weight:700}
.rank3{color:#cd7f32;font-weight:700}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
width:900px;
background:#020617;
border-radius:15px;
padding:30px;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

.stats{
display:flex;
gap:40px;
margin-top:15px;
}

.stat{
background:#111827;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.stat h2{
margin:0;
}

canvas{
margin-top:30px;
}

.history{
margin-top:25px;
max-height:200px;
overflow:auto;
}

.history div{
padding:6px;
border-bottom:1px solid #1e293b;
}

.refresh{
text-align:center;
opacity:0.6;
margin-top:10px;
}

</style>

</head>

<body>

<header>
🎲 TRIO — Game of the Month
</header>

<div class="container">

<div class="card">

<h2>🏆 Leaderboard</h2>

<table id="leaderboard">

<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
<th>Games</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="refresh">
Auto refresh every 60 seconds
</div>

</div>

</div>


<div class="modal" id="playerModal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<h1 id="playerName"></h1>

<div class="stats">

<div class="stat">
<h2 id="games"></h2>
<p>Games</p>
</div>

<div class="stat">
<h2 id="wins"></h2>
<p>Wins</p>
</div>

<div class="stat">
<h2 id="winrate"></h2>
<p>Winrate</p>
</div>

<div class="stat">
<h2 id="points"></h2>
<p>Total Points</p>
</div>

</div>

<canvas id="playerChart"></canvas>

<div class="history" id="history"></div>

</div>

</div>


<script>

const sheet="https://docs.google.com/spreadsheets/d/e/2PACX-1vQl2Kx3SpXSA3IyCQoLaalLjibwCh2f6nURBZU-qABgT6hA5eeGOaiKOfmOas93rwsgi4OlBr-ttbqp/pub?gid=0&single=true&output=csv"

let players={}
let games=[]
let chart

function load(){

Papa.parse(sheet,{
download:true,
header:true,
complete:(res)=>process(res.data)
})

}

function process(data){

players={}
games=data

data.forEach(g=>{

let p=[g.Player1,g.Player2,g.Player3,g.Player4,g.Player5,g.Player6]

p.forEach(player=>{

if(!player)return

if(!players[player]){

players[player]={scores:[],wins:0,games:0,history:[]}

}

players[player].games++

let score=player===g.Winner?6:1

players[player].scores.push(score)

players[player].history.push({
date:g.Date,
score:score,
win:player===g.Winner
})

if(player===g.Winner)players[player].wins++

})

})

buildLeaderboard()

}

function buildLeaderboard(){

let board=[]

Object.keys(players).forEach(p=>{

let top=players[p].scores.slice().sort((a,b)=>b-a).slice(0,10)

let points=top.reduce((a,b)=>a+b,0)

board.push({
name:p,
points:points,
games:players[p].games
})

})

board.sort((a,b)=>b.points-a.points)

render(board)

}

function render(data){

let body=document.querySelector("#leaderboard tbody")

body.innerHTML=""

data.forEach((p,i)=>{

let tr=document.createElement("tr")

let rank=i+1

if(rank===1)tr.classList.add("rank1")
if(rank===2)tr.classList.add("rank2")
if(rank===3)tr.classList.add("rank3")

tr.innerHTML=`
<td>${rank}</td>
<td>${p.name}</td>
<td>${p.points}</td>
<td>${p.games}</td>
`

tr.onclick=()=>openPlayer(p.name)

body.appendChild(tr)

})

}

function openPlayer(name){

let p=players[name]

document.getElementById("playerName").innerText=name

document.getElementById("games").innerText=p.games
document.getElementById("wins").innerText=p.wins
document.getElementById("winrate").innerText=((p.wins/p.games)*100).toFixed(1)+"%"
document.getElementById("points").innerText=p.scores.reduce((a,b)=>a+b,0)

document.getElementById("playerModal").style.display="flex"

let cumulative=[]
let total=0

p.scores.forEach(s=>{
total+=s
cumulative.push(total)
})

if(chart)chart.destroy()

chart=new Chart(document.getElementById("playerChart"),{

type:"line",

data:{
labels:cumulative.map((_,i)=>"Game "+(i+1)),
datasets:[{
label:"Points",
data:cumulative,
fill:true
}]
}

})

let history=document.getElementById("history")

history.innerHTML=""

p.history.reverse().forEach(h=>{

let div=document.createElement("div")

div.innerHTML=`
${h.date || "Game"} — ${h.win?"🏆 Win":"Played"} (+${h.score})
`

history.appendChild(div)

})

}

function closeModal(){

document.getElementById("playerModal").style.display="none"

}

load()

setInterval(load,60000)

</script>

</body>
</html>
