<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>TRIO — Game of the Month</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;

background:
radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #0f172a 0%, transparent 40%),
linear-gradient(135deg,#020617,#0f172a);

color:white;
}

/* floating trio cards */

.cards-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.card-bg{
position:absolute;
font-size:120px;
opacity:0.04;
animation:float 20s infinite linear;
}

.card-bg:nth-child(1){left:10%;top:20%}
.card-bg:nth-child(2){left:70%;top:60%}
.card-bg:nth-child(3){left:40%;top:80%}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* header */

header{
text-align:center;
padding:35px;
font-size:40px;
font-weight:800;
letter-spacing:3px;

background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 20px rgba(168,85,247,0.5);
}

/* container */

.container{
width:1200px;
margin:auto;
margin-top:30px;
}

/* card */

.card{
background:linear-gradient(145deg,#020617,#0f172a);
border-radius:18px;
padding:30px;

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 20px 40px rgba(0,0,0,0.6),
inset 0 0 20px rgba(255,255,255,0.03);

transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:
0 25px 60px rgba(0,0,0,0.8),
0 0 20px rgba(168,85,247,0.2);
}

/* leaderboard */

table{
width:100%;
border-collapse:collapse;
font-size:18px;
}

th{
text-transform:uppercase;
letter-spacing:1px;
opacity:0.8;
}

th,td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

tbody tr{
animation:fadeIn 0.4s ease;
transition:0.2s;
cursor:pointer;
}

tr:hover{
background:linear-gradient(90deg,#312e81,#4c1d95);
transform:scale(1.02);
box-shadow:0 0 12px rgba(168,85,247,0.5);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* ranks */

.rank1{
color:#facc15;
font-weight:700;
text-shadow:0 0 12px #facc15;
}

.rank2{
color:#e5e7eb;
font-weight:700;
text-shadow:0 0 10px #cbd5f5;
}

.rank3{
color:#f97316;
font-weight:700;
text-shadow:0 0 10px #f97316;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
width:900px;

background:
linear-gradient(180deg,#020617,#020617 40%,#111827);

border-radius:18px;

padding:35px;

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 30px 80px rgba(0,0,0,0.8),
0 0 25px rgba(139,92,246,0.3);
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

/* avatar */

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(45deg,#6366f1,#ec4899);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

/* stats */

.stats{
display:flex;
gap:30px;
margin-top:15px;
}

.stat{
background:#111827;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.stat h2{
margin:0;
}

.badges{
margin-top:10px;
font-size:18px;
}

/* history */

.history{
margin-top:25px;
max-height:200px;
overflow:auto;
}

.history div{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* facts */

.facts{
margin-top:25px;
text-align:center;
opacity:0.7;
font-style:italic;
}

</style>

</head>

<body>

<div class="cards-bg">
<div class="card-bg">3</div>
<div class="card-bg">3</div>
<div class="card-bg">3</div>
</div>

<header>
🎲 TRIO — Game of the Month
</header>

<div class="container">

<div class="card">

<h2>🏆 Leaderboard</h2>

<table id="leaderboard">

<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
<th>Games</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="facts" id="facts"></div>

</div>

</div>


<div class="modal" id="playerModal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div class="avatar" id="avatar"></div>

<h1 id="playerName"></h1>

<div class="badges" id="badges"></div>

<div class="stats">

<div class="stat">
<h2 id="games"></h2>
<p>Games</p>
</div>

<div class="stat">
<h2 id="wins"></h2>
<p>Wins</p>
</div>

<div class="stat">
<h2 id="winrate"></h2>
<p>Winrate</p>
</div>

<div class="stat">
<h2 id="points"></h2>
<p>Total Points</p>
</div>

</div>

<canvas id="playerChart"></canvas>

<div class="history" id="history"></div>

</div>

</div>


<script>

const sheet="https://docs.google.com/spreadsheets/d/e/2PACX-1vQl2Kx3SpXSA3IyCQoLaalLjibwCh2f6nURBZU-qABgT6hA5eeGOaiKOfmOas93rwsgi4OlBr-ttbqp/pub?gid=0&single=true&output=csv"

let players={}
let chart

const facts=[
"TRIO is about memory, deduction and a little bit of luck.",
"The fastest TRIO wins usually happen in under 5 minutes.",
"A perfect TRIO round means finding all matches before opponents.",
"The memory is what matters.",
"Many TRIO champions focus on tracking card positions mentally."
]

function load(){

Papa.parse(sheet,{
download:true,
header:true,
complete:(res)=>process(res.data)
})

document.getElementById("facts").innerText=facts[Math.floor(Math.random()*facts.length)]

}

function process(data){

players={}

data.forEach(g=>{

let p=[g.Player1,g.Player2,g.Player3,g.Player4,g.Player5,g.Player6]

p.forEach(player=>{

if(!player)return

if(!players[player]){
players[player]={scores:[],wins:0,games:0,history:[]}
}

players[player].games++

let score=player===g.Winner?6:1

players[player].scores.push(score)

players[player].history.push({
date:g.Date,
score:score,
win:player===g.Winner
})

if(player===g.Winner)players[player].wins++

})

})

buildLeaderboard()

}

function buildLeaderboard(){

let board=[]

Object.keys(players).forEach(p=>{

let top=players[p].scores.slice().sort((a,b)=>b-a).slice(0,10)

let points=top.reduce((a,b)=>a+b,0)

board.push({
name:p,
points:points,
games:players[p].games
})

})

board.sort((a,b)=>b.points-a.points)

render(board)

}

function render(data){

let body=document.querySelector("#leaderboard tbody")

body.innerHTML=""

data.forEach((p,i)=>{

let tr=document.createElement("tr")

let rank=i+1

if(rank===1)tr.classList.add("rank1")
if(rank===2)tr.classList.add("rank2")
if(rank===3)tr.classList.add("rank3")

tr.innerHTML=`
<td>${rank}</td>
<td>${p.name}</td>
<td>${p.points}</td>
<td>${p.games}</td>
`

tr.onclick=()=>openPlayer(p.name)

body.appendChild(tr)

})

}

function openPlayer(name){

let p=players[name]

document.getElementById("playerName").innerText=name
document.getElementById("avatar").innerText=name[0].toUpperCase()

document.getElementById("games").innerText=p.games
document.getElementById("wins").innerText=p.wins
document.getElementById("winrate").innerText=((p.wins/p.games)*100).toFixed(1)+"%"
document.getElementById("points").innerText=p.scores.reduce((a,b)=>a+b,0)

let badges=""

let streak=0
let maxStreak=0

p.history.forEach(h=>{
if(h.win){
streak++
if(streak>maxStreak)maxStreak=streak
}else{
streak=0
}
})

if(maxStreak>=3)badges+="👑 Triple Master "
if(maxStreak>=2)badges+="🔥 Win Streak "

document.getElementById("badges").innerText=badges

document.getElementById("playerModal").style.display="flex"

let cumulative=[]
let total=0

p.scores.forEach(s=>{
total+=s
cumulative.push(total)
})

if(chart)chart.destroy()

chart=new Chart(document.getElementById("playerChart"),{

type:"line",

data:{
labels:cumulative.map((_,i)=>"Game "+(i+1)),
datasets:[{
label:"Points Progression",
data:cumulative,
fill:true,
borderColor:"#a855f7",
backgroundColor:"rgba(168,85,247,0.2)"
}]
}

})

let history=document.getElementById("history")

history.innerHTML=""

p.history.slice().reverse().forEach(h=>{

let div=document.createElement("div")

div.innerHTML=`${h.date || "Game"} — ${h.win?"🏆 Win":"Played"} (+${h.score})`

history.appendChild(div)

})

}

function closeModal(){

document.getElementById("playerModal").style.display="none"

}

load()

setInterval(load,60000)

</script>

</body>
</html>
