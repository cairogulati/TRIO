<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>TRIO — Game of the Month</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;

background:
radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #0f172a 0%, transparent 40%),
linear-gradient(135deg,#020617,#0f172a);

color:white;
}

/* header */

header{
text-align:center;
padding:35px;
font-size:40px;
font-weight:800;
letter-spacing:3px;

background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:1400px;
width:95%;
margin:auto;
margin-top:30px;
}

.card{
background:linear-gradient(145deg,#020617,#0f172a);
border-radius:18px;
padding:30px;
border:1px solid rgba(255,255,255,0.08);
}

table{
width:100%;
border-collapse:collapse;
font-size:20px;
min-width:500px;
}

th,td{
padding:18px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

tbody tr{
cursor:pointer;
transition:0.2s;
}

tr:hover{
background:#312e81;
}

.rank1{color:#facc15}
.rank2{color:#e5e7eb}
.rank3{color:#f97316}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
width:900px;
background:#020617;
border-radius:18px;
padding:35px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#6366f1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
}

.stats{
display:flex;
gap:30px;
margin-top:15px;
}

.stat{
background:#111827;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.history{
margin-top:25px;
max-height:200px;
overflow:auto;
}

.legendStats{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<header>
🎲 TRIO — Game of the Month
</header>

<div class="container">

<div class="card">

<h2>🏆 Leaderboard</h2>

<div style="overflow-x:auto">

<table id="leaderboard">

<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<div class="modal" id="playerModal">

<div class="modal-content">

<div class="avatar" id="avatar"></div>

<h1 id="playerName"></h1>

<div class="stats">

<div class="stat">
<h2 id="wins"></h2>
<p>Wins</p>
</div>

<div class="stat">
<h2 id="games"></h2>
<p>Games</p>
</div>

<div class="stat">
<h2 id="winrate"></h2>
<p>Winrate</p>
</div>

<div class="stat">
<h2 id="points"></h2>
<p>Total Points</p>
</div>

</div>

<div class="legendStats" id="legendStats"></div>

<canvas id="playerChart"></canvas>

<div class="history" id="history"></div>

</div>

</div>

<script>

const sheet="YOUR_GOOGLE_SHEET_CSV"

let players={}
let rivalries={}
let dangerousPlayer=""
let comebackKing=""
let nemesisMaster=""

function load(){

Papa.parse(sheet,{
download:true,
header:true,
complete:(res)=>process(res.data)
})

}

function process(data){

players={}
rivalries={}

data.forEach(g=>{

let p=[g.Player1,g.Player2,g.Player3,g.Player4,g.Player5,g.Player6]

p.forEach(player=>{

if(!player)return

if(!players[player]){
players[player]={scores:[],wins:0,games:0,history:[]}
}

players[player].games++

let score=player===g.Winner?6:1

players[player].scores.push(score)

players[player].history.push({
win:player===g.Winner
})

if(player===g.Winner){

players[player].wins++

p.forEach(opponent=>{

if(opponent && opponent!==player){

let key=player+"|"+opponent

if(!rivalries[key])rivalries[key]=0

rivalries[key]++

}

})

}

})

})

detectStats()

buildLeaderboard()

}

function detectStats(){

let board=[]

Object.keys(players).forEach(p=>{

let top=players[p].scores.slice().sort((a,b)=>b-a).slice(0,10)

let points=top.reduce((a,b)=>a+b,0)

board.push({name:p,points})

})

board.sort((a,b)=>b.points-a.points)

let topPlayers=board.slice(0,3).map(x=>x.name)

let bestDanger=0

Object.keys(players).forEach(p=>{

let wins=0
let games=0

players[p].history.forEach(h=>{
games++
if(h.win)wins++
})

let wr=wins/games

if(wr>bestDanger){
bestDanger=wr
dangerousPlayer=p
}

})

let bestComeback=-1

Object.keys(players).forEach(p=>{

let hist=players[p].history

let mid=Math.floor(hist.length/2)

let early=hist.slice(0,mid)
let late=hist.slice(mid)

let ew=early.filter(x=>x.win).length/(early.length||1)
let lw=late.filter(x=>x.win).length/(late.length||1)

let diff=lw-ew

if(diff>bestComeback){
bestComeback=diff
comebackKing=p
}

})

let bestNemesis=0

Object.keys(rivalries).forEach(key=>{

if(rivalries[key]>bestNemesis){
bestNemesis=rivalries[key]
nemesisMaster=key.split("|")[0]
}

})

}

function buildLeaderboard(){

let board=[]

Object.keys(players).forEach(p=>{

let top=players[p].scores.slice().sort((a,b)=>b-a).slice(0,10)

let points=top.reduce((a,b)=>a+b,0)

board.push({name:p,points})

})

board.sort((a,b)=>b.points-a.points)

render(board)

}

function render(data){

let body=document.querySelector("#leaderboard tbody")

body.innerHTML=""

data.forEach((p,i)=>{

let tr=document.createElement("tr")

let icons=""

if(p.name===dangerousPlayer)icons+=" ⚔️"
if(p.name===comebackKing)icons+=" 🔥"
if(p.name===nemesisMaster)icons+=" 👿"

tr.innerHTML=`
<td>${i+1}</td>
<td>${p.name}${icons}</td>
<td>${p.points}</td>
`

tr.onclick=()=>openPlayer(p.name)

body.appendChild(tr)

})

}

function openPlayer(name){

let p=players[name]

document.getElementById("playerName").innerText=name
document.getElementById("avatar").innerText=name[0]

document.getElementById("wins").innerText=p.wins
document.getElementById("games").innerText=p.games
document.getElementById("winrate").innerText=((p.wins/p.games)*100).toFixed(1)+"%"
document.getElementById("points").innerText=p.scores.reduce((a,b)=>a+b,0)

let stats=""

if(name===dangerousPlayer){
stats+="⚔️ Most Dangerous Player<br>"
}

if(name===comebackKing){
stats+="🔥 Comeback King<br>"
}

if(name===nemesisMaster){
stats+="👿 Nemesis Master<br>"
}

document.getElementById("legendStats").innerHTML=stats

document.getElementById("playerModal").style.display="flex"

}

load()

setInterval(load,60000)

</script>

</body>
</html>
